services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    environment:
      - DISABLE_IPV6=true
      - INSECURE=true
      - INIT_ENABLED=true
      - INIT_HOST=vpn.${DOMAIN}
      - INIT_DNS=${DEFAULT_DNS}
    volumes:
      - /lib/modules:/lib/modules:ro
      - /messier/apps/wg-easy:/etc/wireguard
    labels:
      - "traefik.enable=true"
      - "traefik.docker.allowNonRunning=true"
      - "traefik.http.services.wireguard.loadbalancer.server.port=51821"
      - "traefik.http.routers.wireguard.service=wireguard"
      - "traefik.http.routers.wireguard.rule=Host(`vpn.${DOMAIN}`)"
      - "traefik.http.routers.wireguard.entrypoints=https"
      - "traefik.http.routers.wireguard.tls.certresolver=${CERTRESOLVER:+${CERTRESOLVER}}"
      - "traefik.http.routers.wireguard.middlewares=secure-headers@file,authelia@file"
    ports:
      - "51820:51820/udp"
    networks:
      - virgo
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=1
    restart: always

networks:
  virgo:
    external: true
